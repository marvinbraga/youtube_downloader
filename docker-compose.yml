name: ytd

services:
  app:
    container_name: youtube-downloader
    build:
      context: .
      dockerfile: Dockerfile
    image: youtube-downloader:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # uvicorn workers > 1 racing on SQLite migrations is handled by the
      # idempotent _apply_schema_migrations helper, but SQLite write contention
      # still hurts throughput. Keep it at 1 unless you've moved to Postgres.
      UVICORN_WORKERS: "1"
      # Transcriptions are processed one at a time; extras wait in the queue
      # (status "queued"). Serial processing keeps the in-memory audio-decode
      # peak bounded. Raise only after measuring per-job peak vs the memory cap.
      TRANSCRIPTION_CONCURRENCY: "1"
    volumes:
      # Persist the SQLite DB outside the container.
      - ./data:/app/data
      # Downloaded media — must be a volume; container restarts otherwise wipe it.
      - ./downloads:/app/downloads
      # Optional: per-source cookies (Netscape format). Mount read-only and
      # reference via {YT,INSTAGRAM}_COOKIES_FILE in .env using container paths
      # like /app/cookies/youtube.txt
      - ./cookies:/app/cookies:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # Memory ceiling. Transcription decodes large audio files in memory, so the
    # old 2g cap was OOM-killing transcription jobs (Docker `oom` event +
    # exit 137) even with concurrency limited. Raised to 8g — generous on this
    # host — so a single job has ample headroom. Tune to your machine.
    deploy:
      resources:
        limits:
          memory: 8g
        reservations:
          memory: 512m
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ytd.rule=Host(`ytd.localhost`)"
      - "traefik.http.services.ytd.loadbalancer.server.port=8000"

  # Local S3-compatible storage for development. Only starts when the
  # 's3-dev' profile is active:  docker compose --profile s3-dev up
  minio:
    image: minio/minio:latest
    container_name: youtube-downloader-minio
    profiles: ["s3-dev"]
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3

  # One-shot sidecar that waits for MinIO to be healthy, then creates the
  # default development bucket via the MinIO Client (mc). Only runs under
  # the 's3-dev' profile alongside the minio service. Override the bucket
  # name via MINIO_DEV_BUCKET in your .env.
  minio-init:
    image: minio/mc:latest
    container_name: youtube-downloader-minio-init
    profiles: ["s3-dev"]
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_DEV_BUCKET: ${MINIO_DEV_BUCKET:-youtube-downloader-dev}
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb --ignore-existing local/"$$MINIO_DEV_BUCKET"
        echo "MinIO bucket '$$MINIO_DEV_BUCKET' is ready."
    restart: "no"

  traefik:
    image: traefik:v2.11
    container_name: traefik
    user: "0:955"
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

# Named bind mounts are kept relative to the compose file so `docker compose
# down` doesn't take the data with it. To enable Docker-managed volumes
# instead, replace the host paths above with:
#   volumes:
#     - app-data:/app/data
#     - app-downloads:/app/downloads
# and declare them under a top-level `volumes:` key.
